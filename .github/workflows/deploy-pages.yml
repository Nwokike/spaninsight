name: Deploy to GitHub Pages

on:
  workflow_dispatch:

# Required permissions for GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

env:
  PYTHONUTF8: "1"
  FLET_CLI_NO_RICH_OUTPUT: "1"
  UV_PYTHON: "3.13"
  BUILD_VERSION: ${{ inputs.build_version || '1.0.0' }}
  BUILD_NUMBER: ${{ inputs.build_number || '1' }}

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python & uv
        uses: astral-sh/setup-uv@v6
        
      - name: Build Web App
        # Custom domain (app.spaninsight.com) means base-url is root "/"
        run: uv run flet build web --yes --project spaninsight --product "Spaninsight" --org com.spaninsight --build-version ${{ env.BUILD_VERSION }} --build-number ${{ env.BUILD_NUMBER }} -v
        
      - name: Add CNAME for custom domain
        # GitHub Pages needs this file to remember the custom domain after each deploy
        run: echo "app.spaninsight.com" > build/web/CNAME
        
      - name: Setup Pages
        uses: actions/configure-pages@v5
        
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'build/web'
          
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
